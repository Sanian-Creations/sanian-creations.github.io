<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/reset.css">
<link rel="stylesheet" href="/css/default.css">
<link rel="modulepreload" href="/js/reorderable.js">
<script type="module" src="/js/default.js"></script>
<style>
table {
	border-collapse: separate;
	border-spacing: 5px;
}
td:not(:first-child) {
	padding: 10px;
	margin: 10px;
	width: 150px;
	border-radius: 5px;
	border: 1px solid black;
	background-color: #444;
}

#my-reorderable>tr>td:first-child {
	cursor: ns-resize;
	width: 50px;
	text-align: center;
}
#my-reorderable>tr>td:first-child::before {
	content: "";
	color: red;
	display: inline-block;
	width: 25px;
	height: 9px;
	background-image: linear-gradient(#666 1px, transparent 0);
	background-size: auto 4px;
}

/*
Note: if you do 'border-collapse: collapse' then borders on the td and tr do not move
along when you drag them, but at least you CAN have borders on tr elems...
But if you do 'border-collapse: separate', then you cannot have borders on tr, only on td
*/

/* this is REQUIRED for mobile to work properly */
#my-reorderable>tr>td:first-child {
	touch-action: none; /* could maaybe do this dynamically...? or maybe add it in .moving, but idk if we add that class too late */
}
.moving {
	z-index: 1000; /*with animations below, some elems will shortly go in front of the moving one */
	position: relative; /*otherwise z-index does nothing*/
}
</style>
</head>
<body style="min-height: 150vh; justify-content: start;">
	<div class="flex-r gap align-i-c"><a href="/" class="button">🠈</a><h1>Re-orderable list</h1></div>

	<table>
		<tbody id="my-reorderable">
			<tr><td></td><td>Re-order me!</td></tr>
			<tr><td></td><td>a</td></tr>
			<tr><td></td><td>b</td></tr>
			<tr><td></td><td>c</td></tr>
			<tr><td></td><td>d</td></tr>
			<tr><td></td><td>e</td></tr>
			<tr><td></td><td>f</td></tr>
			<tr><td></td><td>g</td></tr>
			<tr><td></td><td>h</td></tr>
			<tr><td></td><td>i</td></tr>
			<tr><td></td><td>j</td></tr>
			<tr><td></td><td style="height:100px">Try scrolling,</td></tr>
			<tr><td></td><td style="height:100px">whilst holding</td></tr>
			<tr><td></td><td style="height:100px">an item!</td></tr>
			<tr><td></td><td>k</td></tr>
			<tr><td></td><td>l</td></tr>
			<tr><td></td><td>m</td></tr>
		</tbody>
	</table>
	<p hidden id="secret-message">Most interactive lists can't do that!</p>
<script type="module">
import {make_reorderable} from "/js/reorderable.js";
import {$,on} from "/js/default.js"
make_reorderable($("#my-reorderable"), "#my-reorderable>tr>td:first-child");
let num_active_drags = 0;
let secret_shown = false;
on("reorder-pickup", window, ()=>{num_active_drags++});
on("reorder-drop", window, ()=>{num_active_drags--});
on("scroll", window, ()=>{
	if (!secret_shown && num_active_drags > 0) {
		secret_shown = true;
		$("#secret-message").removeAttribute("hidden");
	}
})

// TODO:
// It would be cool to make a system like those online tools that let you type out JS CSS and HTML in the browser
// whilst updating the content of an iframe to show you what it does. But that may be a bit out of my league.
</script>
</body>
</html>
